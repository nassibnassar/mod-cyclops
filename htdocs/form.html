<html>
  <head>
    <title>Interactive form for mod-cyclops</title>
    <script src="sendRequest.js" defer></script>
  </head>
  <body>
    <h1>Interactive form for mod-cyclops</h1>

    <h2>Sets</h2>
    <p>
      <button type="button" onclick="getObject('/cyclops/sets')">List sets</a></button>
      Or <a href="/cyclops/sets">link</a>
    </p>
    <p>
      <form id="create-set-form">
	<label for="nameToAdd">Set name:</label>
	<input type="text" id="nameToAdd" value="test.mike" />
	<button type="submit">Create</button>
      </form>
      <script>
	document.getElementById('create-set-form').addEventListener('submit', function (e) {
	  e.preventDefault();
	  postData('/cyclops/sets', { name: document.getElementById('nameToAdd').value });
	});
      </script>
    </p>
    <p>
      <form id="delete-set-form">
	<label for="nameToDelete">Set name:</label>
	<input type="text" id="nameToDelete" value="test.mike" />
	<button type="submit">Delete</button>
      </form>
      <script>
	document.getElementById('delete-set-form').addEventListener('submit', function (e) {
	  e.preventDefault();
	  deleteObject('/cyclops/sets/' + document.getElementById('nameToDelete').value);
	});
      </script>
    </p>
    <p>
      <form id="search-set-form">
	<label for="nameToSearch">Set name:</label>
	<input type="text" id="nameToSearch" value="test.mike" />
	<button type="submit">Search</button>
      </form>
      <script>
	document.getElementById('search-set-form').addEventListener('submit', function (e) {
	  e.preventDefault();
	  const url = '/cyclops/sets/' + document.getElementById('nameToSearch').value + '?fields=*';
	  window.location.href = url;
	});
      </script>
    </p>
  </body>
</html>
