<html>
  <head>
    <title>Interactive form for mod-cyclops</title>
    <script src="sendRequest.js" defer></script>
    <style>
      hr { color: #eee; margin-top: 2em; }
    </style>
  </head>
  <body>
    <h1>Interactive form for mod-cyclops</h1>

    <h2>Sets</h2>
    <p>
      <button type="button" onclick="getObject('/cyclops/sets')">List sets</a></button>
      Or <a href="/cyclops/sets">link</a>
    </p>
    <hr />
    <p>
      <form id="create-set-form">
	<label for="add-name">Set name:</label>
	<input type="text" id="add-name" value="test.mike" />
	<button type="submit">Create</button>
      </form>
      <script>
	document.getElementById('create-set-form').addEventListener('submit', function (e) {
	  e.preventDefault();
	  postData('/cyclops/sets', { name: document.getElementById('add-name').value });
	});
      </script>
    </p>
    <p>
      <form id="delete-set-form">
	<label for="delete-name">Set name:</label>
	<input type="text" id="delete-name" value="test.mike" />
	<button type="submit">Delete</button>
      </form>
      <script>
	document.getElementById('delete-set-form').addEventListener('submit', function (e) {
	  e.preventDefault();
	  deleteObject('/cyclops/sets/' + document.getElementById('delete-name').value);
	});
      </script>
    </p>
    <hr />
    <p>
      <form id="search-set-form">
	<label for="search-name">Set name:</label>
	<input type="text" id="search-name" value="test.mike" />
	<label for="search-fields">Fields:</label>
	<input type="text" id="search-fields" value="*" />
	<label for="search-fields">Cond:</label>
	<input type="text" id="search-cond" value="title='Hallelujah Junction'" />
	<label for="search-fields">Sort:</label>
	<input type="text" id="search-sort" value="title" />
	<button type="submit">Search</button>
      </form>
      <script>
	document.getElementById('search-set-form').addEventListener('submit', function (e) {
	  e.preventDefault();
	  const searchName = document.getElementById('search-name').value
	  const searchFields = document.getElementById('search-fields').value
	  const searchCond = document.getElementById('search-cond').value
	  const searchSort = document.getElementById('search-sort').value
	  const url = '/cyclops/sets/' + searchName + '?fields=' + searchFields + '&cond=' + searchCond + '&sort=' + searchSort;
	  window.location.href = url;
	});
      </script>
    </p>
  </body>
</html>
